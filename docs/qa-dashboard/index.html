<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA System Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white font-sans antialiased">
    <!-- Navbar -->
    <nav class="bg-gray-800 shadow-lg border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-shield-halved text-emerald-400 text-2xl mr-3"></i>
                    <span class="font-bold text-xl tracking-wider">QA System Dashboard</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-400">Last updated: <span id="last-updated" class="font-semibold text-gray-200">-</span></span>
                    <button id="refresh-btn" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm transition"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        
        <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <!-- Unit Tests -->
                <div class="glass-panel p-6 card-hover relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-xs font-semibold text-gray-400 mb-1 tracking-wider">UNIT TESTS (Rust)</p>
                            <h3 class="text-3xl font-bold text-white group-hover:text-blue-400 transition-colors" id="unit-total">0</h3>
                        </div>
                        <div class="p-3 rounded-lg bg-blue-500/10 text-blue-400">
                            <i class="fas fa-flask text-xl"></i>
                        </div>
                    </div>
                    <div class="flex items-center text-sm">
                        <span class="text-emerald-400 flex items-center mr-3"><i class="fas fa-check mr-1"></i><span id="unit-passed">0</span> Passed</span>
                        <span class="text-rose-400 flex items-center"><i class="fas fa-times mr-1"></i><span id="unit-failed">0</span> Failed</span>
                    </div>
                </div>

                <!-- Coverage -->
                <div class="glass-panel p-6 card-hover relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-xs font-semibold text-gray-400 mb-1 tracking-wider">COVERAGE (Tarpaulin)</p>
                            <h3 class="text-3xl font-bold text-white group-hover:text-emerald-400 transition-colors" id="cov-percentage">0%</h3>
                        </div>
                        <div class="p-3 rounded-lg bg-emerald-500/10 text-emerald-400">
                            <i class="fas fa-chart-pie text-xl"></i>
                        </div>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-1.5 mt-4">
                        <div class="bg-emerald-500 h-1.5 rounded-full transition-all duration-1000" id="cov-bar" style="width: 0%"></div>
                    </div>
                </div>

                <!-- BDD -->
                <div class="glass-panel p-6 card-hover relative overflow-hidden group opacity-50">
                    <div class="absolute top-0 left-0 w-1 h-full bg-purple-500"></div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-xs font-semibold text-gray-400 mb-1 tracking-wider">BDD SCENARIOS (N/A)</p>
                            <h3 class="text-3xl font-bold text-white group-hover:text-purple-400 transition-colors" id="bdd-total">0</h3>
                        </div>
                        <div class="p-3 rounded-lg bg-purple-500/10 text-purple-400">
                            <i class="fas fa-users-cog text-xl"></i>
                        </div>
                    </div>
                    <div class="flex items-center text-sm">
                        <span class="text-emerald-400 flex items-center mr-3"><i class="fas fa-check mr-1"></i><span id="bdd-passed">0</span> Passed</span>
                        <span class="text-rose-400 flex items-center"><i class="fas fa-times mr-1"></i><span id="bdd-failed">0</span> Failed</span>
                    </div>
                </div>

                <!-- Mutation -->
                <div class="glass-panel p-6 card-hover relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-1 h-full bg-amber-500"></div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-xs font-semibold text-gray-400 mb-1 tracking-wider">MUTATION (cargo-mutants)</p>
                            <h3 class="text-3xl font-bold text-white group-hover:text-amber-400 transition-colors" id="mut-total">0</h3>
                        </div>
                        <div class="p-3 rounded-lg bg-amber-500/10 text-amber-400">
                            <i class="fas fa-hourglass-half text-xl"></i>
                        </div>
                    </div>
                    <div class="flex items-center text-sm">
                        <span class="text-rose-400 flex items-center mr-3"><i class="fas fa-bug mr-1"></i><span id="mut-survived">0</span> Survived</span>
                        <span class="text-emerald-400 flex items-center"><i class="fas fa-skull mr-1"></i><span id="mut-killed">0</span> Killed</span>
                    </div>
                </div>
            </div></div>
            </div>
        </div>

        <!-- Detailed Sections -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Unit Tests Details -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-md">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2"><i class="fa-solid fa-flask text-blue-400 mr-2"></i> Recent Unit Tests</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-gray-400 bg-gray-750">
                            <tr>
                                <th class="py-2 px-3">Test Case</th>
                                <th class="py-2 px-3">Duration</th>
                                <th class="py-2 px-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="unit-tests-body" class="divide-y divide-gray-700">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- BDD Details -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-md">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2"><i class="fa-solid fa-users-gear text-purple-400 mr-2"></i> BDD Features</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-gray-400 bg-gray-750">
                            <tr>
                                <th class="py-2 px-3">Feature / Scenario</th>
                                <th class="py-2 px-3">Steps</th>
                                <th class="py-2 px-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="bdd-tests-body" class="divide-y divide-gray-700">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
