<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA System Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white font-sans antialiased">
    <!-- Navbar -->
    <nav class="bg-gray-800 shadow-lg border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-shield-halved text-emerald-400 text-2xl mr-3"></i>
                    <span class="font-bold text-xl tracking-wider">QA System Dashboard</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-400">Last updated: <span id="last-updated" class="font-semibold text-gray-200">-</span></span>
                    <button id="refresh-btn" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm transition"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Unit Tests -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-md border-l-4 border-blue-500 hover:shadow-lg transition">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-gray-400 font-semibold mb-1">UNIT TESTS (Pytest)</p>
                        <h3 class="text-3xl font-bold" id="unit-total">-</h3>
                    </div>
                    <div class="bg-blue-500/20 p-2 rounded-lg text-blue-400">
                        <i class="fa-solid fa-flask text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 flex text-sm gap-4">
                    <span class="text-green-400"><i class="fa-solid fa-check"></i> <span id="unit-passed">-</span> Passed</span>
                    <span class="text-red-400"><i class="fa-solid fa-xmark"></i> <span id="unit-failed">-</span> Failed</span>
                </div>
            </div>

            <!-- Coverage -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-md border-l-4 border-emerald-500 hover:shadow-lg transition">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-gray-400 font-semibold mb-1">COVERAGE (Pytest-Cov)</p>
                        <h3 class="text-3xl font-bold text-emerald-400"><span id="coverage-percent">-</span>%</h3>
                    </div>
                    <div class="bg-emerald-500/20 p-2 rounded-lg text-emerald-400">
                        <i class="fa-solid fa-chart-pie text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 w-full bg-gray-700 rounded-full h-2">
                    <div id="coverage-bar" class="bg-emerald-400 h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>

            <!-- BDD -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-md border-l-4 border-purple-500 hover:shadow-lg transition">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-gray-400 font-semibold mb-1">BDD SCENARIOS (Behave)</p>
                        <h3 class="text-3xl font-bold" id="bdd-total">-</h3>
                    </div>
                    <div class="bg-purple-500/20 p-2 rounded-lg text-purple-400">
                        <i class="fa-solid fa-users-gear text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 flex text-sm gap-4">
                    <span class="text-green-400"><i class="fa-solid fa-check"></i> <span id="bdd-passed">-</span> Passed</span>
                    <span class="text-red-400"><i class="fa-solid fa-xmark"></i> <span id="bdd-failed">-</span> Failed</span>
                </div>
            </div>

            <!-- Mutation -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-md border-l-4 border-amber-500 hover:shadow-lg transition">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-gray-400 font-semibold mb-1">MUTATION (Mutmut)</p>
                        <h3 class="text-3xl font-bold" id="mut-total">-</h3>
                    </div>
                    <div class="bg-amber-500/20 p-2 rounded-lg text-amber-400">
                        <i class="fa-solid fa-dna text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 flex text-sm gap-4">
                    <span class="text-red-400" title="Mutants that survived (Bad)"><i class="fa-solid fa-bug"></i> <span id="mut-survived">-</span> Survived</span>
                    <span class="text-green-400" title="Mutants killed by tests (Good)"><i class="fa-solid fa-skull"></i> <span id="mut-killed">-</span> Killed</span>
                </div>
            </div>
        </div>

        <!-- Detailed Sections -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Unit Tests Details -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-md">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2"><i class="fa-solid fa-flask text-blue-400 mr-2"></i> Recent Unit Tests</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-gray-400 bg-gray-750">
                            <tr>
                                <th class="py-2 px-3">Test Case</th>
                                <th class="py-2 px-3">Duration</th>
                                <th class="py-2 px-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="unit-tests-body" class="divide-y divide-gray-700">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- BDD Details -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-md">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2"><i class="fa-solid fa-users-gear text-purple-400 mr-2"></i> BDD Features</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-gray-400 bg-gray-750">
                            <tr>
                                <th class="py-2 px-3">Feature / Scenario</th>
                                <th class="py-2 px-3">Steps</th>
                                <th class="py-2 px-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="bdd-tests-body" class="divide-y divide-gray-700">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
