name: CI/CD Pipeline - Pruebas y Reportes

on:
  push:
    branches: [ "codigo" ]
  pull_request:
    branches: [ "codigo" ]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  security-events: write
  checks: write

jobs:
  testing:
    name: Pruebas Automatizadas (Unitarias, BDD, Mutación)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || echo "No se pudo instalar con npm ci"

      - name: Create Reports Directory
        run: mkdir -p reports

      # 1. PRUEBAS UNITARIAS Y COBERTURA REAL (Vitest)
      - name: Run Unit & Integration Tests (Coverage)
        run: |
          npm install -D vitest @vitest/ui @vitest/coverage-v8
          npx vitest run --coverage.enabled --coverage.reporter=html --reporter=html --outputFile.html=html/index.html || true
          mkdir -p reports/coverage
          mkdir -p reports/pytest
          cp -r coverage/* reports/coverage/ 2>/dev/null || true
          cp -r html/* reports/pytest/ 2>/dev/null || true

      # 2. PRUEBAS BDD Y E2E REALES (Playwright)
      - name: Install Playwright Browsers
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps || true

      - name: Run BDD Tests (Playwright)
        run: |
          npx playwright test --reporter=html || true
          mkdir -p reports/bdd
          cp -r playwright-report/* reports/bdd/ 2>/dev/null || true
          if [ ! -f reports/bdd/index.html ]; then
            echo "<html><body><h1>Reporte BDD</h1><p>Pruebas BDD no generaron reporte.</p></body></html>" > reports/bdd/index.html
          fi

      # 3. MUTATION TESTING (Stryker)
      - name: Run Mutation Tests (Stryker)
        run: |
          npx stryker run || true
          mkdir -p reports/mutation
          cp -r reports/mutation/html/* reports/mutation/ 2>/dev/null || true
          if [ ! -f reports/mutation/index.html ]; then
            echo "<html><body><h1>Reporte de Mutación</h1><p>No se encontraron pruebas de mutación configuradas.</p></body></html>" > reports/mutation/index.html
          fi

      - name: Upload Reports Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

  deploy-pages:
    name: Publicar Reportes en GitHub Pages
    needs: testing
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/codigo'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Reports Artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: public
          
      - name: Create index.html for Pages
        run: |
          cp -r qa-dashboard-template/* public/ || echo "Warning: qa-dashboard-template not found, using generic index"
          # Agregamos enlaces a los reportes reales al final del body si existen
          sed -i 's/<\/body>/<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4"><h3 class="text-xl font-bold text-white mb-2">Reportes Detallados HTML<\/h3><ul class="list-disc list-inside text-blue-400"><li><a href="coverage\/index.html" class="hover:underline">Cobertura (Vitest)<\/a><\/li><li><a href="bdd\/index.html" class="hover:underline">BDD (Playwright)<\/a><\/li><li><a href="mutation\/index.html" class="hover:underline">Mutación (Stryker)<\/a><\/li><li><a href="pytest\/index.html" class="hover:underline">Unitarias<\/a><\/li><\/ul><\/div><\/body>/' public/index.html || true
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
        
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
