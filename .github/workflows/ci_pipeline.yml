name: CI/CD Pipeline - Pruebas y Reportes

on:
  push:
    branches: [ "codigo" ]
  pull_request:
    branches: [ "codigo" ]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  security-events: write
  checks: write

jobs:
  testing:
    name: Pruebas Automatizadas (Unitarias, BDD, Mutación)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Create Reports Directory
        run: mkdir -p reports

      # 1. Pruebas Unitarias (Rust)
      - name: Run Unit Tests (Rust)
        run: |
          cd src-tauri
          cargo test -- -Z unstable-options --format=json > ../reports/test_results.json || true
          cargo test > ../reports/test_results.txt || true
        env:
          RUSTC_BOOTSTRAP: 1 # Needed for unstable-options format=json in stable rust

      # 2. Cobertura Real (Tarpaulin)
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin || true

      - name: Run Coverage (Tarpaulin)
        run: |
          cd src-tauri
          cargo tarpaulin --out Html --out Json --output-dir ../reports || true

      # 3. Pruebas de Mutación (cargo-mutants)
      - name: Install cargo-mutants
        run: cargo install cargo-mutants || true

      - name: Run Mutation Tests
        run: |
          cd src-tauri
          cargo mutants --output ../reports/mutants_out || true

      - name: Upload Reports Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

  deploy-pages:
    name: Publicar Reportes en GitHub Pages
    needs: testing
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/codigo'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Reports Artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: public
          
      - name: Create index.html for Pages
        run: |
          mkdir -p public
          # Generate real data json
          cd docs/qa-dashboard && (node generate_data.cjs || true) && cd ../..
          cp -r docs/qa-dashboard/* public/ || echo "Warning: docs/qa-dashboard not found"
          # Agregamos enlaces a los reportes de Rust al final del body
          sed -i 's/<\/body>/<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4"><h3 class="text-xl font-bold text-white mb-2">Reportes Detallados HTML<\/h3><ul class="list-disc list-inside text-blue-400"><li><a href="tarpaulin-report.html" class="hover:underline">Cobertura de Código (Tarpaulin)<\/a><\/li><li><a href="mutants_out\/index.html" class="hover:underline">Reporte de Mutación (cargo-mutants)<\/a><\/li><li><a href="test_results.txt" class="hover:underline">Resultados Unitarios (Logs)<\/a><\/li><\/ul><\/div><\/body>/' public/index.html || true
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
        
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
