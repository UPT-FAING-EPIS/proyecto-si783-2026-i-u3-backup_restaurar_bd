name: Tests Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests (Unit, Integration, E2E, BDD, Stryker)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          npx playwright install --with-deps chromium
          
      - name: Run Unit & Integration Tests
        run: npx vitest run tests/unit tests/integration --coverage
        
      - name: Run BDD / E2E Tests
        run: npx playwright test
        
      - name: Run UI Tests
        run: npx vitest run tests/ui || true
        
      - name: Run Mutation Tests
        continue-on-error: true
        run: npx stryker run || true
