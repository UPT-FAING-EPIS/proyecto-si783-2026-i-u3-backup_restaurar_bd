
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: safebridge-api
    restart: always
    ports:
      - "8091:8000"
    environment:
      - TEMP_DIR=/tmp/safebridge_backups
    volumes:
      - api_temp_data:/tmp/safebridge_backups

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: safebridge-bot
    restart: always
    command: python src/bot/main.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_URL=http://api:8000/api/v1
    depends_on:
      - api
    env_file:
      - .env

volumes:
  api_temp_data:
